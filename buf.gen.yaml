version: v2
inputs:
  - module: buf.build/project-kessel/inventory-api
plugins:
  # Standard protobuf Python stubs (type hints)
  - remote: buf.build/protocolbuffers/pyi:v31.1
    out: src
    include_imports: true
  # Standard protobuf Python message classes
  - remote: buf.build/protocolbuffers/python:v31.1
    out: src
    include_imports: true
  # Connect-Python plugin (pure Python, no C compilation)
  - remote: buf.build/connectrpc/python:v0.9.0
    out: src
    include_imports: true
